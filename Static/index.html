
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiNeuralChat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #334155;
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }
        
        .logo {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .logo-svg {
            width: 56px;
            height: 56px;
        }
        
        .brand {
            display: flex;
            flex-direction: column;
        }
        
        .brand-name {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }
        
        .brand-subtitle {
            font-size: 12px;
            color: #64748b;
        }
        
        .new-chat-btn {
            padding: 16px 20px;
        }
        
        .btn-new-chat {
            width: 100%;
            padding: 12px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }
        
        .btn-new-chat:hover {
            background: #2563eb;
        }
        
        .conversations {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .conversations-header {
            padding: 16px 20px 8px;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .conversations-header h3 {
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
        }
        
        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }
        
        /* Main area */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .chat-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .chat-info {
            display: flex;
            flex-direction: column;
        }
        
        .chat-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
        }
        
        .chat-subtitle {
            font-size: 14px;
            color: #64748b;
            margin-top: 2px;
        }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-icon {
            width: 36px;
            height: 36px;
            border: none;
            background: #f8fafc;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        
        .btn-icon:hover {
            background: #f1f5f9;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid #f1f5f9;
        }
        
        .chat-input-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 4px;
            gap: 8px;
            transition: border-color 0.2s;
        }
        
        .input-wrapper:focus-within {
            border-color: #3b82f6;
        }
        
        .btn-attach {
            width: 40px;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            color: #64748b;
        }
        
        .btn-attach:hover {
            background: #f1f5f9;
            color: #334155;
        }
        
        .chat-input {
            flex: 1;
            border: none;
            background: none;
            padding: 12px 16px;
            font-size: 15px;
            outline: none;
            color: #1e293b;
            resize: none;
            min-height: 20px;
            max-height: 120px;
            font-family: inherit;
        }
        
        .chat-input::placeholder {
            color: #94a3b8;
        }
        
        .btn-send {
            width: 40px;
            height: 40px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        
        .btn-send:hover:not(:disabled) {
            background: #2563eb;
        }
        
        .btn-send:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }
        
        .input-footer {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: #94a3b8;
        }
        
        /* Welcome screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }
        
        .welcome-icon {
            margin-bottom: 24px;
            opacity: 0.8;
        }
        
        .welcome-screen h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
        }
        
        .welcome-screen p {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 32px;
            max-width: 500px;
        }
        
        .example-prompts {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 600px;
            width: 100%;
        }
        
        .prompt-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .prompt-card:hover {
            background: #f1f5f9;
            border-color: #3b82f6;
        }
        
        .prompt-text {
            font-size: 14px;
            font-weight: 500;
            color: #334155;
        }
        
        /* Message styles */
        .message {
            display: flex;
            margin-bottom: 24px;
            gap: 12px;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: #3b82f6;
            color: white;
        }
        
        .message.ai .message-avatar {
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
        }
        
        .message-content {
            flex: 1;
            max-width: 70%;
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .message.user .message-bubble {
            background: #3b82f6;
            color: white;
        }
        
        .message.ai .message-bubble {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #334155;
        }
        
        .message-time {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 6px;
            text-align: center;
        }
        
        /* Typing indicator */
        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }
        
        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing-bounce 1.4s infinite ease-in-out;
        }
        
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        .typing-dots span:nth-child(3) { animation-delay: 0s; }
        
        @keyframes typing-bounce {
            0%, 80%, 100% { 
                transform: scale(0);
                opacity: 0.5;
            }
            40% { 
                transform: scale(1);
                opacity: 1;
            }
        }
        
        /* Scrollbar */
        .conversation-list::-webkit-scrollbar,
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .conversation-list::-webkit-scrollbar-track,
        .chat-messages::-webkit-scrollbar-track {
            background: #f8fafc;
        }
        
        .conversation-list::-webkit-scrollbar-thumb,
        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->

                        <line x1="140" y1="75" x2="155" y2="70" stroke="#3b82f6" stroke-width="1"/>
                        <line x1="155" y1="70" x2="170" y2="75" stroke="#1d4ed8" stroke-width="1"/>

                    </svg>
                </div>

            <div class="new-chat-btn">
                <button class="btn-new-chat">
                    <span>+</span>
                    New Chat

            <div class="conversations">
                <div class="conversations-header">
                    <h3>Conversations</h3>

                <div class="conversation-list" id="conversation-list">

            </div>
        </div>
        
        <!-- Main chat area -->
        <div class="main-area">
            <!-- Chat header -->
            <div class="chat-header">
                <div class="chat-info">
                    <div class="chat-title">

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let conversations = [];
        let currentMessages = [];
        
        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            loadConversations();
            setupEventListeners();
            showWelcomeMessage();
        });
        
        function setupEventListeners() {
            // Send message on Enter key
            const chatInput = document.getElementById('chat-input');
            
            // Send button click
            document.getElementById('send-button').addEventListener('click', sendMessage);
            
            // New chat button
            document.querySelector('.btn-new-chat').addEventListener('click', startNewChat);
            
            // Input change handler
            chatInput.addEventListener('input', adjustTextarea);
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function adjustTextarea() {
            const textarea = document.getElementById('chat-input');
            const sendButton = document.getElementById('send-button');
            
            // Auto-resize
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
            
            // Enable/disable send button
            const hasText = textarea.value.trim().length > 0;
            sendButton.disabled = !hasText;
        }
        
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            // Show upload status message
            addMessage(`📎 Uploading "${file.name}"...`, true);
            showTyping();
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${API_BASE}/documents/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                hideTyping();
                
                if (response.ok) {
                    addMessage(`✅ "${file.name}" uploaded successfully! You can now ask questions about this document.`, false);
                } else {
                    addMessage(`❌ Failed to upload "${file.name}". Error: ${data.detail || 'Unknown error'}`, false);
                }
                
            } catch (error) {
                hideTyping();
                addMessage(`❌ Upload failed for "${file.name}". Please check your connection and try again.`, false);
                console.error('Upload error:', error);
            }
            
            // Clear file input for next upload
            event.target.value = '';
        }
        
        function showWelcomeMessage() {
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.innerHTML = `
                <div class="welcome-screen">
                    <div class="welcome-icon">
                        <svg width="80" height="80" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                            <!-- Chat bubble with gradient -->
                            <defs>
                                <linearGradient id="welcomeChatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#a855f7"/>
                                    <stop offset="50%" style="stop-color:#6366f1"/>
                                    <stop offset="100%" style="stop-color:#06b6d4"/>
                                </linearGradient>
                            </defs>
                            
                            <!-- Left chat bubble -->
                            <path d="M45 60 
                                     C30 60, 20 70, 20 85 
                                     L20 120 
                                     C20 135, 30 145, 45 145 
                                     L70 145 
                                     L85 165 
                                     L85 145 
                                     L95 145 
                                     C110 145, 120 135, 120 120 
                                     L120 85 
                                     C120 70, 110 60, 95 60 Z" 
                                  fill="url(#welcomeChatGradient)" 
                                  stroke="#1e293b" 
                                  stroke-width="3"/>
                            
                            <!-- Three dots in chat bubble -->
                            <circle cx="55" cy="102" r="6" fill="white"/>
                            <circle cx="70" cy="102" r="6" fill="white"/>
                            <circle cx="85" cy="102" r="6" fill="white"/>
                            
                            <!-- Brain outline -->
                            <path d="M130 50 
                                     C140 45, 150 45, 160 50
                                     C170 45, 180 50, 185 60
                                     C190 70, 185 80, 180 90
                                     C185 100, 180 110, 175 120
                                     C170 130, 160 135, 150 135
                                     C140 135, 130 130, 125 120
                                     C120 110, 125 100, 130 90

                    <h2>Welcome to AiNeuralChat</h2>
                    <p>Ask me anything! I can help with questions, conversations, and document analysis.</p>
                    <div class="example-prompts">
                        <div class="prompt-card" onclick="usePrompt('Hello! How are you today?')">
                            <span class="prompt-text">Say hello 👋🏻</span>
                        </div>
                        <div class="prompt-card" onclick="usePrompt('What can you help me with?')">
                            <span class="prompt-text">Explore capabilities 🧠</span>
                        </div>
                        <div class="prompt-card" onclick="usePrompt('Explain quantum computing in simple terms')">
                            <span class="prompt-text">Learn something new 🔰</span>
                        </div>
                        <div class="prompt-card" onclick="usePrompt('Write a creative story about AI')">
                            <span class="prompt-text">Creative writing ✍🏻</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function usePrompt(text) {
            document.getElementById('chat-input').value = text;
            adjustTextarea();
            sendMessage();
        }
        
        async function sendMessage() {
            const chatInput = document.getElementById('chat-input');
            const sendButton = document.getElementById('send-button');
            const message = chatInput.value.trim();
            
            if (!message) return;
            
            // Disable send button and clear input
            sendButton.disabled = true;
            chatInput.value = '';
            adjustTextarea();
            
            // Add user message
            addMessage(message, true);
            
            // Show typing indicator
            showTyping();
            
            try {
                const response = await fetch(`${API_BASE}/chat/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ content: message })
                });
                
                const data = await response.json();
                
                // Hide typing indicator
                hideTyping();
                
                if (response.ok && data.message && data.message.content) {
                    addMessage(data.message.content, false);
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', false);
                }
                
            } catch (error) {
                hideTyping();
                addMessage('Connection error. Please check if the server is running.', false);
            }
            
            // Re-enable send button
            sendButton.disabled = false;
        }
        
        function addMessage(content, isUser) {
            const messagesContainer = document.getElementById('chat-messages');
            
            // Clear welcome screen if it exists
            if (messagesContainer.querySelector('.welcome-screen')) {
                messagesContainer.innerHTML = '';
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${isUser ? 'U' : 'AI'}</div>
                <div class="message-content">
                    <div class="message-bubble">${content}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function showTyping() {
            const messagesContainer = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai typing-indicator';
            typingDiv.id = 'typing';
            
            typingDiv.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content">
                    <div class="message-bubble">
                        <div class="typing-dots">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function hideTyping() {
            const typingElement = document.getElementById('typing');
            if (typingElement) {
                typingElement.remove();
            }
        }
        
        function startNewChat() {
            currentMessages = [];
            document.querySelector('.chat-title span').textContent = 'Chat';
            showWelcomeMessage();
        }
        
        function loadConversations() {
            const conversationList = document.getElementById('conversation-list');
            
            // Add dummy conversation history
            const dummyConversations = [
                {
                    id: '1',
                    title: 'Document Analysis Help',
                    preview: 'How to analyze uploaded documents...',
                    time: '2 hours ago'
                },
                {
                    id: '2', 
                    title: 'Project Planning Discussion',
                    preview: 'Can you help me plan my project...',
                    time: 'Yesterday'
                },
                {
                    id: '3',
                    title: 'Code Review Session',
                    preview: 'Please review this Python code...',
                    time: '2 days ago'
                },
                {
                    id: '4',
                    title: 'Research Questions',
                    preview: 'What are the latest trends in...',
                    time: '3 days ago'
                },
                {
                    id: '5',
                    title: 'Writing Assistance',
                    preview: 'Help me write a professional...',
                    time: '1 week ago'
                }
            ];
            
            conversationList.innerHTML = '';
            
            dummyConversations.forEach(conv => {
                const convElement = document.createElement('div');
                convElement.className = 'conversation-item';
                convElement.style.cssText = `
                    padding: 12px 16px;
                    margin: 4px 0;
                    border-radius: 8px;
                    cursor: pointer;
                    transition: background-color 0.2s;
                    border-left: 3px solid transparent;
                `;
                
                convElement.innerHTML = `
                    <div style="font-size: 14px; font-weight: 500; color: #1e293b; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;">
                        ${conv.title}
                    </div>
                    <div style="font-size: 12px; color: #64748b; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;">
                        ${conv.preview}
                    </div>
                    <div style="font-size: 11px; color: #94a3b8;">
                        ${conv.time}
                    </div>
                `;
                
                // Add hover effect
                convElement.addEventListener('mouseenter', () => {
                    convElement.style.backgroundColor = '#f8fafc';
                    convElement.style.borderLeftColor = '#3b82f6';
                });
                
                convElement.addEventListener('mouseleave', () => {
                    convElement.style.backgroundColor = 'transparent';
                    convElement.style.borderLeftColor = 'transparent';
                });
                
                // Add click handler
                convElement.addEventListener('click', () => {
                    loadConversation(conv.id, conv.title);
                });
                
                conversationList.appendChild(convElement);
            });
        }
        
        function loadConversation(convId, title) {
            // Clear current messages and show a sample conversation
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.innerHTML = '';
            
            // Update chat title
            document.querySelector('.chat-title span').textContent = title;
            
            // Add sample messages for the conversation
            setTimeout(() => {
                addMessage("Hello! I need help with this topic.", true);
            }, 100);
            
            setTimeout(() => {
                addMessage("I'd be happy to help you with that! Could you provide more details about what specifically you'd like to know?", false);
            }, 500);
            
            setTimeout(() => {
                addMessage("Sure! Let me explain the main points...", true);
            }, 900);
            
            setTimeout(() => {
                addMessage("Great! Based on what you've shared, here are some key insights and recommendations...", false);
            }, 1300);
        }
    </script>
